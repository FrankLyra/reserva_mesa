services:
  db:
    image: postgres:16-alpine
    container_name: reserva_mesas_prod_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reserva_mesas}
      POSTGRES_USER: ${POSTGRES_USER:-reserva}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reserva}
    volumes:
      - reserva_mesas_prod_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reserva} -d ${POSTGRES_DB:-reserva_mesas}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    container_name: reserva_mesas_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-reserva_mesas}
      DB_USERNAME: ${POSTGRES_USER:-reserva}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-reserva}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      SERVER_PORT: 8081
    ports:
      - "${API_PORT:-8081}:8081"

volumes:
  reserva_mesas_prod_db:
