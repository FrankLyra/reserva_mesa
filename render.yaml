services:
  - type: web
    name: reserva-mesas-api
    runtime: docker
    repo: https://github.com/FrankLyra/reserva_mesa.git
    branch: main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    healthCheckPath: /api/eventos
    envVars:
      - key: SERVER_PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: reserva-mesas-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MINUTES
        value: 120
      - key: PIX_EXPIRATION_MINUTES
        value: 20
      - key: ADMIN_EMAIL
        value: admin@reservas.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: RESET_DATABASE_ON_START
        value: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false

databases:
  - name: reserva-mesas-db
    databaseName: reserva_mesas
    user: reserva
    plan: free
    region: oregon
