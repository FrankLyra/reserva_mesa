<main class="cadastro-page">
  <section class="cadastro-panel">
    <header>
      <h1>Cadastro de usuario</h1>
      <p>Seu usuario sera seu e-mail e a senha informada abaixo.</p>
    </header>

    <form [formGroup]="form" (ngSubmit)="cadastrar()" novalidate>
      <label>
        <span>E-mail *</span>
        <input class="form-control" type="email" formControlName="email" autocomplete="email">
      </label>

      <label>
        <span>Senha *</span>
        <input class="form-control" type="password" formControlName="senha" autocomplete="new-password">
      </label>

      <label>
        <span>Qual seu nome completo? *</span>
        <input class="form-control" type="text" formControlName="nome" autocomplete="name">
      </label>

      <label>
        <span>Qual seu telefone? *</span>
        <input class="form-control" type="tel" formControlName="telefone" autocomplete="tel">
      </label>

      <fieldset>
        <legend>Voce e morador ou convidado? *</legend>
        <div class="choice-row">
          <button type="button" class="btn" [class.btn-primary]="tipoUsuario() === 'MORADOR'" [class.btn-outline-primary]="tipoUsuario() !== 'MORADOR'" (click)="alterarTipo('MORADOR')">Morador</button>
          <button type="button" class="btn" [class.btn-primary]="tipoUsuario() === 'CONVIDADO'" [class.btn-outline-primary]="tipoUsuario() !== 'CONVIDADO'" (click)="alterarTipo('CONVIDADO')">Convidado</button>
        </div>
      </fieldset>

      <label *ngIf="tipoUsuario() === 'MORADOR'">
        <span>Qual seu bloco e apartamento? *</span>
        <input class="form-control" type="text" formControlName="blocoApartamento" placeholder="Ex: Bloco A - Apto 101">
      </label>

      <p *ngIf="mensagem" class="alert alert-danger">{{ mensagem }}</p>

      <button type="submit" class="btn btn-primary w-100" [disabled]="salvando">
        {{ salvando ? 'Cadastrando...' : 'Criar cadastro' }}
      </button>
    </form>

    <a routerLink="/login">Ja tenho cadastro</a>
  </section>
</main>
