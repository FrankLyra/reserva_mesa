<main class="login-page">
  <section class="login-panel">
    <div class="brand">
      <h1>Reserva de Mesas</h1>
      <p>Acesse como administrador ou cliente.</p>
    </div>

    <div class="quick-access">
      <button type="button" class="btn btn-outline-dark" (click)="usarAdmin()">Admin</button>
      <button type="button" class="btn btn-outline-dark" (click)="usarCliente()">Cliente</button>
    </div>

    <form [formGroup]="form" (ngSubmit)="entrar()" novalidate>
      <label>
        <span>E-mail</span>
        <input class="form-control" type="email" formControlName="email" autocomplete="email">
      </label>

      <label>
        <span>Senha</span>
        <input class="form-control" type="password" formControlName="senha" autocomplete="current-password">
      </label>

      <p *ngIf="mensagem" class="alert alert-danger">{{ mensagem }}</p>

      <button type="submit" class="btn btn-primary w-100" [disabled]="carregando">
        {{ carregando ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <div class="login-links">
      <a routerLink="/cadastro">Criar cadastro</a>
      <a routerLink="/reservas">Ir para reservas</a>
    </div>
  </section>
</main>
