spring:
  application:
    name: reserva-mesas-api
  datasource:
    url: ${DB_URL:jdbc:h2:mem:reservamesas;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:troque-esta-chave-em-producao-com-pelo-menos-32-caracteres}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  pix:
    expiration-minutes: ${PIX_EXPIRATION_MINUTES:20}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
